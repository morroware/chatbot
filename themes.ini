[default]
name = "Default"
primary_color = "#1e293b"
secondary_color = "#334155"
accent_color = "#6366f1"
background_color = "#0f172a"
header_gradient = "linear-gradient(135deg, #1e293b 0%, #334155 100%)"
avatar_filter = "none"
description = "Clean and modern dark theme"

[midnight]
name = "Midnight"
primary_color = "#0f172a"
secondary_color = "#1e293b"
accent_color = "#3b82f6"
background_color = "#020617"
header_gradient = "linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%)"
avatar_filter = "brightness(0.9) contrast(1.1)"
description = "Deep dark blue for focused work"

[ocean]
name = "Ocean"
primary_color = "#164e63"
secondary_color = "#155e75"
accent_color = "#22d3ee"
background_color = "#0c4a6e"
header_gradient = "linear-gradient(135deg, #164e63 0%, #0e7490 100%)"
avatar_filter = "brightness(1.05) hue-rotate(180deg)"
description = "Calm ocean depths"

[sunrise]
name = "Sunrise"
primary_color = "#7c2d12"
secondary_color = "#9a3412"
accent_color = "#fb923c"
background_color = "#431407"
header_gradient = "linear-gradient(135deg, #7c2d12 0%, #c2410c 50%, #ea580c 100%)"
avatar_filter = "brightness(1.1) sepia(0.3)"
description = "Warm morning energy"

[warmth]
name = "Warmth"
primary_color = "#78350f"
secondary_color = "#92400e"
