[default]
name = "The Study"
primary_color = "#2b1d0e"
secondary_color = "#3d2f1f"
accent_color = "#c0a080"
background_color = "#1a1410"
header_gradient = "linear-gradient(180deg, #1a1410 0%, #2b1d0e 100%)"
avatar_filter = "sepia(0.9) contrast(1.3) brightness(0.9)"
description = "A chamber filled with forgotten lore and dying embers"

[raven]
name = "Plutonian Shore"
primary_color = "#0a0a14"
secondary_color = "#000000"
accent_color = "#4b0082"
background_color = "#050508"
header_gradient = "linear-gradient(135deg, #000000 0%, #0a0a14 50%, #191970 100%)"
avatar_filter = "grayscale(1.0) contrast(1.5) brightness(0.7)"
description = "Darkness there and nothing more - quoth the Raven"

[reddeath]
name = "The Red Death"
primary_color = "#8b0000"
secondary_color = "#000000"
accent_color = "#ff0000"
background_color = "#1a0000"
header_gradient = "linear-gradient(90deg, #000000 0%, #450000 50%, #8b0000 100%)"
avatar_filter = "contrast(1.6) saturate(0.1) brightness(0.8) drop-shadow(0 0 8px rgba(255,0,0,0.6))"
description = "The clock strikes midnight in the seventh chamber"

[usher]
name = "House of Usher"
primary_color = "#2f4f4f"
secondary_color = "#1c1c1c"
accent_color = "#696969"
background_color = "#0d0d0d"
header_gradient = "linear-gradient(to bottom, #2f4f4f 0%, #1c1c1c 100%)"
avatar_filter = "opacity(0.75) blur(0.6px) grayscale(0.8)"
description = "A fissure extends from roof to foundation"

[goldbug]
name = "Sullivan's Island"
primary_color = "#b8860b"
secondary_color = "#8b6914"
accent_color = "#ffd700"
background_color = "#2c2416"
header_gradient = "linear-gradient(45deg, #8b6914 0%, #b8860b 50%, #006400 100%)"
avatar_filter = "sepia(1.0) saturate(1.3) contrast(1.2)"
description = "The gold-bug and the death's-head reveal hidden treasure"

[telltale]
name = "Beneath the Floorboards"
primary_color = "#5c4033"
secondary_color = "#3e2723"
accent_color = "#8b0000"
background_color = "#1a0f0a"
header_gradient = "repeating-linear-gradient(45deg, #3e2723 0px, #3e2723 15px, #2a1a16 15px, #2a1a16 30px)"
avatar_filter = "contrast(1.6) brightness(0.85) saturate(0.9)"
description = "Louder! Louder! The beating of the hideous heart!"

[amontillado]
name = "The Catacombs"
primary_color = "#654321"
secondary_color = "#000000"
accent_color = "#ff8c00"
background_color = "#1a1108"
header_gradient = "radial-gradient(ellipse at center top, #ff8c00 0%, #654321 40%, #000000 100%)"
avatar_filter = "brightness(0.7) contrast(1.5) sepia(0.4)"
description = "For the love of God, Montresor! The nitre drips from the vaults"

[annabellee]
name = "Kingdom by the Sea"
primary_color = "#4682b4"
secondary_color = "#5f9ea0"
accent_color = "#87ceeb"
background_color = "#001a33"
header_gradient = "linear-gradient(to top, #001a33 0%, #003d5c 50%, #4682b4 100%)"
avatar_filter = "brightness(1.15) saturate(0.6) hue-rotate(200deg)"
description = "A wind blew out of a cloud, chilling my Annabel Lee"

[masque]
name = "The Masquerade"
primary_color = "#8b008b"
secondary_color = "#4b0082"
accent_color = "#ff1493"
background_color = "#1a001a"
header_gradient = "linear-gradient(90deg, #1a001a 0%, #4b0082 33%, #8b008b 66%, #8b0000 100%)"
avatar_filter = "saturate(1.5) contrast(1.4) hue-rotate(280deg)"
description = "The seven rooms - each a different hue"

[ligeia]
name = "The Rhine"
primary_color = "#2e003e"
secondary_color = "#1a001a"
accent_color = "#9370db"
background_color = "#0d000d"
header_gradient = "linear-gradient(135deg, #0d000d 0%, #2e003e 100%)"
avatar_filter = "brightness(0.9) contrast(1.4) saturate(1.1) hue-rotate(270deg)"
description = "The wild eyes of Ligeia - what mystery lay behind them?"