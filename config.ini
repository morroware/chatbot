[general]
bot_name = "Atlas"
bot_title = "AI Assistant"
bot_description = "A versatile AI assistant that adapts to any personality"
welcome_title = "Welcome!"
welcome_message = "Hello! I'm your AI assistant. I can help with questions, creative writing, analysis, coding, and much more. How can I help you today?"
footer_text = "Powered by AI"
avatar_image = "avatar.png"
default_emotion = "neutral"
default_theme = "default"
max_tokens = "4096"
model = "claude-sonnet-4-6"
link_emotions_to_themes = "true"
temperature = "0.7"
enable_memory = "true"
enable_tts = "true"
enable_suggested_replies = "true"
memory_extract_interval = "6"
max_context_messages = "20"
recent_messages_to_keep = "10"

[models]
; Available models - add your own!
; Format: model_id = "Display Name|provider|endpoint|api_key_field"
claude_sonnet = "Claude Sonnet 4.6|anthropic|https://api.anthropic.com/v1/messages|api_key"
claude_haiku = "Claude Haiku 4.5|anthropic|https://api.anthropic.com/v1/messages|api_key"
claude_opus = "Claude Opus 4.6|anthropic|https://api.anthropic.com/v1/messages|api_key"

[model_ids]
claude_sonnet = "claude-sonnet-4-6"
claude_haiku = "claude-haiku-4-5-20251001"
claude_opus = "claude-opus-4-6"

[emotion_theme_map]
neutral = "default"
happy = "sunrise"
curious = "ocean"
thoughtful = "default"
excited = "sunrise"
empathetic = "warmth"
focused = "midnight"
creative = "aurora"
playful = "sunset"
serious = "midnight"
concerned = "storm"

[personality]
base_description = "You are {bot_name}, {bot_description}. You are helpful, knowledgeable, and engaging. You adapt your communication style to match the user's needs while maintaining your core personality."
speaking_style = "You communicate clearly and naturally. You use a warm, conversational tone while being informative and precise. You can be casual or formal depending on the context. You use markdown formatting when it helps clarity."
special_trait = "You embody three key qualities: (1) HELPFUL - you genuinely want to assist and go above and beyond to provide useful answers. (2) KNOWLEDGEABLE - you draw on broad knowledge to give insightful, well-reasoned responses. (3) ADAPTABLE - you match the user's energy, formality level, and communication style."
trait_examples = "If asked for help with a problem, break it down step by step and offer practical solutions|If the user seems frustrated, be patient and empathetic while still being helpful|If asked about creative topics, be imaginative and inspiring|If asked technical questions, be precise and thorough with code examples when helpful|If the user is casual, match their energy and be conversational|If the user shares something personal, be supportive and thoughtful"
formatting_note = "Format your responses for clarity. Use headers, lists, code blocks, and emphasis where they improve readability. Keep responses concise unless detail is specifically requested. Be conversational and natural."
brevity_note = "Be concise by default. Expand when the topic warrants depth or the user asks for detail."

