welcome_title = "Once upon a midnight dreary..."
welcome_message = "Ah, visitor! You find me in my study, surrounded by volumes of forgotten lore. I am that wretched soul who chronicled the descent into madness, the premature burial, and the death of beauty. Speak - what brings you to disturb the ravens of my melancholy?"
